{% set python_min = "3.11" %}
{% set name = "catalystcoop.ferc_xbrl_extractor" %}
{% set version = "1.10.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/d1/00/3e6de2978df747657710be2dee3e62ad941e82e5114b662cb0fde8d31353/catalystcoop_ferc_xbrl_extractor-{{ version }}.tar.gz
  sha256: 01eac20a18cb1e22ec12066e38a93f9e379d524d10568fd81a0306195ceff386

build:
  entry_points:
    - xbrl_extract = ferc_xbrl_extractor.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }},<3.15.0.a0
    - arelle-release >=2.32
    - coloredlogs >=14.0
    - python-duckdb >=1.3.2
    - frictionless >=5,<6
    - lxml >=4.9.1
    - numpy >=1.16,<3
    - pandas >=1.5
    - pyarrow >=14.0.1
    - pydantic >=2,<3
    - sqlalchemy >=1.4,<3
    - stringcase >=1.2

test:
  imports:
    - ferc_xbrl_extractor
  commands:
    - pip check
    - xbrl_extract --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/catalyst-cooperative/ferc-xbrl-extractor
  summary: A tool for extracting data from FERC XBRL regulatory filings into SQLite databases.
  dev_url: https://github.com/catalyst-cooperative/ferc-xbrl-extractor
  doc_url: https://catalystcoop-ferc-xbrl-extractor.readthedocs.io/en/latest/
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - zschira
    - zaneselvans
    - jdangerx
